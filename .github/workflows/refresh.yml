name: Refresh news word cloud

on:
  schedule:
    # Every 15 min, offset from the hour boundary to dodge GitHub's
    # documented scheduled-workflow delays during top-of-hour load spikes.
    # Re-committed this file to force GitHub to re-register the schedule
    # after the first activation didn't fire for ~2 hours.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Covers 4 refreshes 15 min apart (45 min of sleep) plus overhead.
    # GitHub's own `schedule:` trigger has proven unreliable on its own
    # (observed 60-105 min gaps). Self-dispatch (first step below) is the
    # primary mechanism that keeps this running forever; schedule: is
    # kept only as a redundant backup in case the chain ever breaks.
    timeout-minutes: 65
    steps:
      - name: Arm next run
        # Fires before anything else so the chain survives even if the
        # rest of this job fails outright. Each run re-dispatches itself,
        # so once one run is kicked off manually, this repeats forever
        # with no dependency on any external scheduler, cloud routine, or
        # either owner's computer being on. concurrency (above) queues
        # this behind the current run rather than starting it in
        # parallel, and de-dupes it against schedule:'s own firings.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run "Refresh news word cloud" --repo jessestrait/news-wordcloud --ref main \
            || echo "Self-dispatch failed -- falling back to native cron only."

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          git config user.name "news-wordcloud-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4; do
            # data/latest.json and manifest.json are fully regenerated by
            # refresh.js every run, not incrementally edited -- there's
            # nothing in them worth merging. Resetting to the current
            # remote tip right before regenerating means the only precious
            # data (today's appended ndjson line) lands on top of whatever
            # another overlapping trigger already pushed, instead of a
            # `pull --rebase` trying to reconcile two independently
            # regenerated versions of the same file and hitting a real
            # conflict (observed in production: exit code 1, job failed,
            # that refresh silently lost).
            for attempt in 1 2 3; do
              git fetch origin main --quiet
              git reset --hard origin/main --quiet
              node scripts/refresh.js
              git add data/
              if git diff --quiet --cached; then
                echo "No changes, skipping commit."
                break
              fi
              git commit -m "Refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)" --quiet
              if git push --quiet; then
                break
              fi
              echo "Push lost a race with another run (attempt $attempt/3), resyncing and retrying..."
            done
            if [ "$i" -lt 4 ]; then
              sleep 900
            fi
          done
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
